<!DOCTYPE html>
<html>
<head>
  <title>LinkUp Chat</title>

  <style>
    :root {
      --bg: #0f172a;
      --text: white;
      --panel: #1e293b;
      --input: #111827;
      --accent: #38bdf8;
      --bubble-me: #38bdf8;
      --bubble-other: #1e293b;
    }

    body.light {
      --bg: #f1f5f9;
      --text: black;
      --panel: #e2e8f0;
      --input: #cbd5f5;
      --accent: #0ea5e9;
      --bubble-me: #0ea5e9;
      --bubble-other: #e2e8f0;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: var(--panel);
      padding: 15px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      position: relative;
    }

    .toggle {
      position: absolute;
      right: 15px;
      top: 10px;
      cursor: pointer;
    }

    .top-controls {
      padding: 10px;
      text-align: center;
      background: var(--input);
    }

    input, button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin: 5px;
    }

    input {
      width: 150px;
    }

    button {
      background: var(--accent);
      color: black;
      cursor: pointer;
      font-weight: bold;
    }

    #chat {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 60%;
      padding: 10px 15px;
      border-radius: 15px;
    }

    .me {
      align-self: flex-end;
      background: var(--bubble-me);
      color: black;
    }

    .other {
      align-self: flex-start;
      background: var(--bubble-other);
    }

    .bottom {
      display: flex;
      padding: 10px;
      background: var(--input);
    }

    .bottom input {
      flex: 1;
      margin-right: 10px;
    }
  </style>
</head>

<body>

<header>
  🔗 LinkUp Chat
  <span class="toggle" onclick="toggleTheme()">🌙</span>
</header>

<div class="top-controls">
  <button onclick="createRoom()">Create Room</button>
  <span>Code: <b id="roomCode">---</b></span><br>
  <input id="joinCode" placeholder="Enter Code">
  <button onclick="joinRoom()">Join</button>
</div>

<div id="chat"></div>

<div class="bottom">
  <input id="msg" placeholder="Type a message..." onkeypress="handleKey(event)">
  <button onclick="sendMsg()">Send</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
let peer;
let conn;

// Theme toggle
function toggleTheme() {
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}

// Load theme
window.onload = () => {
  const saved = localStorage.getItem("theme");
  if (saved === "light") {
    document.body.classList.add("light");
  }
};

// Generate room code
function generateCode() {
  return Math.random().toString(36).substring(2, 7).toUpperCase();
}

// Create room
function createRoom() {
  const code = generateCode();

  peer = new Peer(code);

  peer.on('open', () => {
    document.getElementById("roomCode").innerText = code;
  });

  peer.on('connection', c => {
    conn = c;

    conn.on('open', () => {
      addMessage("Friend joined", "other");
    });

    conn.on('data', data => {
      addMessage(data, "other");
    });
  });
}

// Join room
function joinRoom() {
  const code = document.getElementById("joinCode").value;

  peer = new Peer();

  peer.on('open', () => {
    conn = peer.connect(code);

    conn.on('open', () => {
      addMessage("Connected!", "other");
    });

    conn.on('data', data => {
      addMessage(data, "other");
    });
  });
}

// Send message
function sendMsg() {
  const input = document.getElementById("msg");
  const msg = input.value.trim();

  if (!msg) return;

  if (!conn || !conn.open) {
    alert("Not connected");
    return;
  }

  conn.send(msg);
  addMessage(msg, "me");
  input.value = "";
}

// Enter key send
function handleKey(e) {
  if (e.key === "Enter") {
    sendMsg();
  }
}

// Display message
function addMessage(msg, type) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "bubble " + type;
  div.innerText = msg;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
